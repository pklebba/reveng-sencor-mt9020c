<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <defs>
    <marker id="ir" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#e67e22"/>
    </marker>
  </defs>
  <style>
    .wire{stroke:#34495e;stroke-width:2;fill:none}
    .rail5{stroke:#c0392b;stroke-width:3.5;fill:none}
    .railg{stroke:#2c3e50;stroke-width:3.5;fill:none}
    .led{fill:#aed6f1;stroke:#1f6391;stroke-width:2}
    .bar{stroke:#1f6391;stroke-width:3}
    .res{fill:#fdebd0;stroke:#b9770e;stroke-width:2}
    .fet{fill:#eafaf1;stroke:#1e8449;stroke-width:2}
    .esp{fill:#f4ecf7;stroke:#6c3483;stroke-width:2}
    .ir{stroke:#e67e22;stroke-width:2}
    .dot{fill:#34495e}
    .t{font-size:14px;fill:#1c2833}
    .lbl{font-size:13px;fill:#5d6d7e}
    .val{font-size:13px;fill:#1c2833;font-weight:bold}
    .cur{font-size:12px;fill:#c0392b;font-weight:bold}
    .title{font-size:18px;fill:#1c2833;font-weight:bold}
    .sub{font-size:13px;fill:#5d6d7e}
  </style>

  <!-- title -->
  <text x="460" y="26" text-anchor="middle" class="title">Nadajnik IR — 2 × 2N7000, 2 stringi po 2 diody (TSAL6400)</text>
  <text x="460" y="46" text-anchor="middle" class="sub">GPIO4 steruje obiema bramkami · każdy tranzystor niesie tylko ~100 mA · zasilanie 5 V (USB)</text>

  <!-- rails -->
  <path class="rail5" d="M60,70 H790"/>
  <text x="52" y="66" text-anchor="end" fill="#c0392b" font-size="14" font-weight="bold">+5 V</text>
  <path class="railg" d="M60,520 H790"/>
  <text x="52" y="524" text-anchor="end" fill="#2c3e50" font-size="14" font-weight="bold">GND</text>

  <!-- ESP32-S3 -->
  <rect class="esp" x="40" y="262" width="150" height="160" rx="8"/>
  <text x="115" y="336" text-anchor="middle" class="t" font-weight="bold">ESP32-S3</text>
  <text x="115" y="356" text-anchor="middle" class="lbl">DevKitC-1</text>
  <!-- ESP 5V pin -->
  <path class="wire" d="M90,262 V70"/>
  <circle class="dot" cx="90" cy="70" r="3.5"/>
  <text x="96" y="256" class="lbl">5V</text>
  <!-- ESP GND pin -->
  <path class="wire" d="M90,422 V520"/>
  <circle class="dot" cx="90" cy="520" r="3.5"/>
  <text x="96" y="440" class="lbl">GND</text>
  <!-- GPIO4 -->
  <path class="wire" d="M190,342 H220"/>
  <text x="196" y="334" class="lbl">GPIO4</text>

  <!-- gate resistor 100R -->
  <rect class="res" x="220" y="330" width="60" height="24"/>
  <text x="250" y="324" text-anchor="middle" class="val">100 Ω</text>
  <path class="wire" d="M280,342 H320"/>

  <!-- gate node riser + pulldown 100k -->
  <path class="wire" d="M320,342 V380"/>
  <circle class="dot" cx="320" cy="380" r="3.5"/>
  <path class="wire" d="M320,380 V400"/>
  <rect class="res" x="308" y="400" width="24" height="60"/>
  <text x="338" y="435" class="val">100 kΩ</text>
  <path class="wire" d="M320,460 V520"/>
  <circle class="dot" cx="320" cy="520" r="3.5"/>

  <!-- gate bus (crosses string-A source with NO junction = not connected) -->
  <path class="wire" d="M320,380 H620"/>
  <circle class="dot" cx="440" cy="380" r="3.5"/>
  <circle class="dot" cx="620" cy="380" r="3.5"/>
  <path class="wire" d="M440,380 V342"/>
  <path class="wire" d="M620,380 V342"/>

  <!-- ============ STRING A (cx=470) ============ -->
  <path class="wire" d="M470,70 V103"/>
  <circle class="dot" cx="470" cy="70" r="3.5"/>
  <!-- LED1 -->
  <polygon class="led" points="454,103 486,103 470,138"/>
  <line class="bar" x1="454" y1="141" x2="486" y2="141"/>
  <path class="wire" d="M470,141 V158"/>
  <!-- LED2 -->
  <polygon class="led" points="454,158 486,158 470,193"/>
  <line class="bar" x1="454" y1="196" x2="486" y2="196"/>
  <path class="wire" d="M470,196 V215"/>
  <!-- emission -->
  <line class="ir" x1="488" y1="122" x2="510" y2="106" marker-end="url(#ir)"/>
  <line class="ir" x1="492" y1="132" x2="514" y2="116" marker-end="url(#ir)"/>
  <!-- resistor -->
  <rect class="res" x="456" y="215" width="28" height="50"/>
  <text x="492" y="244" class="val">15–18 Ω</text>
  <path class="wire" d="M470,265 V310"/>
  <!-- MOSFET Q1 -->
  <rect class="fet" x="440" y="310" width="60" height="65" rx="4"/>
  <text x="470" y="338" text-anchor="middle" class="lbl">Q1</text>
  <text x="470" y="356" text-anchor="middle" class="lbl" font-size="11">2N7000</text>
  <text x="446" y="330" class="lbl" font-size="11">D</text>
  <text x="446" y="372" class="lbl" font-size="11">S</text>
  <text x="425" y="339" class="lbl" font-size="11">G</text>
  <!-- source to GND -->
  <path class="wire" d="M470,375 V520"/>
  <circle class="dot" cx="470" cy="520" r="3.5"/>
  <text x="482" y="470" class="cur">~100 mA</text>

  <!-- ============ STRING B (cx=650) ============ -->
  <path class="wire" d="M650,70 V103"/>
  <circle class="dot" cx="650" cy="70" r="3.5"/>
  <!-- LED1 -->
  <polygon class="led" points="634,103 666,103 650,138"/>
  <line class="bar" x1="634" y1="141" x2="666" y2="141"/>
  <path class="wire" d="M650,141 V158"/>
  <!-- LED2 -->
  <polygon class="led" points="634,158 666,158 650,193"/>
  <line class="bar" x1="634" y1="196" x2="666" y2="196"/>
  <path class="wire" d="M650,196 V215"/>
  <!-- emission -->
  <line class="ir" x1="668" y1="122" x2="690" y2="106" marker-end="url(#ir)"/>
  <line class="ir" x1="672" y1="132" x2="694" y2="116" marker-end="url(#ir)"/>
  <!-- resistor -->
  <rect class="res" x="636" y="215" width="28" height="50"/>
  <text x="672" y="244" class="val">15–18 Ω</text>
  <path class="wire" d="M650,265 V310"/>
  <!-- MOSFET Q2 -->
  <rect class="fet" x="620" y="310" width="60" height="65" rx="4"/>
  <text x="650" y="338" text-anchor="middle" class="lbl">Q2</text>
  <text x="650" y="356" text-anchor="middle" class="lbl" font-size="11">2N7000</text>
  <text x="626" y="330" class="lbl" font-size="11">D</text>
  <text x="626" y="372" class="lbl" font-size="11">S</text>
  <text x="605" y="339" class="lbl" font-size="11">G</text>
  <!-- source to GND -->
  <path class="wire" d="M650,375 V520"/>
  <circle class="dot" cx="650" cy="520" r="3.5"/>
  <text x="662" y="470" class="cur">~100 mA</text>

  <!-- bulk cap 470uF -->
  <path class="wire" d="M740,70 V284"/>
  <circle class="dot" cx="740" cy="70" r="3.5"/>
  <line class="wire" x1="722" y1="284" x2="758" y2="284"/>
  <line class="wire" x1="726" y1="296" x2="754" y2="296"/>
  <path class="wire" d="M740,296 V520"/>
  <circle class="dot" cx="740" cy="520" r="3.5"/>
  <text x="748" y="278" fill="#c0392b" font-size="13" font-weight="bold">+</text>
  <text x="766" y="296" class="val">470 µF</text>

  <!-- string labels -->
  <text x="410" y="180" text-anchor="middle" class="lbl" transform="rotate(-90 410 180)">string A · 2× TSAL6400</text>
  <text x="590" y="180" text-anchor="middle" class="lbl" transform="rotate(-90 590 180)">string B · 2× TSAL6400</text>
</svg>
