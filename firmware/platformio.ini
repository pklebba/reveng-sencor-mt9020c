; PlatformIO project — Sencor MT9020C ESP32 IR bridge
; Open this folder in CLion (PlatformIO plugin) or run `pio run -t upload`.

[platformio]
default_envs = esp32s3

; Shared settings. We use the pioarduino fork of the Espressif platform: it
; ships the Arduino core 3.x for every current chip (classic ESP32 *and* the
; newer RISC-V parts C6/H2/P4), so one platform covers both boards below.
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
; No external libs — IR carrier is generated by the core's RMT peripheral.

; --- ESP32-S3-DevKitC-1 (N16R8) — the target IR-hub board ----------------
; USB-C native USB (TinyUSB CDC). Onboard addressable RGB LED on GPIO48 is used
; as a status indicator (see main.cpp). N16R8 = 16 MB flash + octal PSRAM;
; PSRAM is unused here, so it's left off (enable via memory_type if ever needed).
[env:esp32s3]
board = esp32-s3-devkitc-1
board_build.flash_size  = 16MB
board_upload.flash_size = 16MB
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
; To use the octal PSRAM add:  board_build.arduino.memory_type = qio_opi

; --- ESP32-C6 dev board (USB-C, native USB-Serial-JTAG) -------------------
; Recommended: proper power (no brownout) and no manual bootloader dance.
; Port auto-detected (shows up as /dev/ttyACM*); Serial runs over native USB.
[env:esp32c6]
board = esp32-c6-devkitc-1
; C6 native USB is USB-Serial-JTAG (HWCDC), not TinyUSB — both flags needed so
; Serial maps to the hardware CDC instead of the undeclared USBSerial.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- Bare ESP-WROOM-32 + CP2102 ------------------------------------------
; Stable by-id path for the CP2102 (survives replug / ttyUSB renumbering).
; List yours with: ls /dev/serial/by-id/
[env:esp32dev]
board = esp32dev
upload_speed = 115200
upload_port  = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
monitor_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
